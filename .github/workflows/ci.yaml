name: Build image

on:
  push:
    branches: ["main"]
  pull_request:
    branches:
      - "**"
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:
  workflow_call:
  
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: 'true'

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install hugo
        run: |
          # renovate: datasource=github-releases depName=gohugoio/hugo
          HUGO_VERSION=v0.164.0
          HUGO_VERSION_NO_V=${HUGO_VERSION#v}
          wget https://github.com/gohugoio/hugo/releases/download/${HUGO_VERSION}/hugo_${HUGO_VERSION_NO_V}_linux-amd64.deb
          sudo dpkg -i hugo_${HUGO_VERSION_NO_V}_linux-amd64.deb

      - name: Hugo build
        run: hugo

      - name: Build the Docker image
        run: docker build . --file Dockerfile --tag martynvandijke/vandijke.xyz:latest

      - name: Push Docker image
        if: github.event_name != 'pull_request' && github.ref != 'refs/heads/main'
        run: |
          docker tag martynvandijke/vandijke.xyz:latest ghcr.io/martynvdijke/vandijke.xyz:latest
          docker push martynvandijke/vandijke.xyz:latest
          docker push ghcr.io/martynvdijke/vandijke.xyz:latest

      - name: Gotify Success Notification
        if: success()
        uses: eikendev/gotify-action@master
        with:
          gotify_api_base: ${{ secrets.GOTIFY_API_BASE }}
          gotify_app_token: ${{ secrets.GOTIFY_APP_TOKEN }}
          notification_title: 'Build Successful - vandijke.xyz'
          notification_message: 'Site built and Docker image pushed successfully.'

      - name: Gotify Failure Notification
        if: failure()
        uses: eikendev/gotify-action@master
        with:
          gotify_api_base: ${{ secrets.GOTIFY_API_BASE }}
          gotify_app_token: ${{ secrets.GOTIFY_APP_TOKEN }}
          notification_title: 'Build Failed - vandijke.xyz'
          notification_message: 'The build workflow has failed. ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
          notification_priority: 5

  otel:
    permissions:
      contents: read # Required. To access the private repository
      actions: read # Required. To read workflow runs
      pull-requests: read # Optional. To read PR labels
      checks: read # Optional. To read run annotations
    if: always()
    name: OpenTelemetry Export Trace
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Export workflow
        uses: corentinmusard/otel-cicd-action@v4
        with:
          otlpEndpoint: ${{ secrets.OTLP_ENDPOINT }}
          otlpHeaders: ${{ secrets.OTLP_HEADERS }}
          otelToken: ${{ secrets.OTEL_TOKEN }}
